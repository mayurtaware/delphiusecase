trigger:
  branches:
    include:
      - main
      - develop 
  paths:
    include:
      - src/**
      - Dockerfile

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - Dockerfile

pool:
  name: 'agent-pool-prod'

variables:
  acrName: 'proddelphiappregistry.azurecr.io'    
  imageRepository: 'delphi-api'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: $(Build.BuildId)

stages:
  - stage: Build
    displayName: 'Build and Push Docker Image'
    jobs:
      - job: BuildAndPush
        displayName: 'Build and Push to ACR'
        steps:
          - checkout: self
            displayName: 'Checkout Code'

          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: 'build'
              dockerfile: $(dockerfilePath)
              repository: '$(acrName)/$(imageRepository)'
              tags: |
                $(tag)
                latest

          - task: Docker@2
            displayName: 'Push to ACR'
            inputs:
              command: 'push'
              containerRegistry: 'acr-service-connection'  # replace with your service connection name
              repository: '$(acrName)/$(imageRepository)'
              tags: |
                $(tag)
                latest

          - task: Bash@3
            displayName: 'Post-Build Summary'
            inputs:
              targetType: 'inline'
              script: |
                echo "========================================="
                echo "✓ Docker Build and Push Completed"
                echo "========================================="
                echo "ACR: $(acrName)"
                echo "Image: $(imageRepository)"
                echo "Tags: $(tag), latest"
                echo "Build ID: $(Build.BuildId)"
                echo "Source Branch: $(Build.SourceBranch)"
                echo "========================================="